<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskal</title>
    <link rel="stylesheet" href="/frontend/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Taskal</h1>
      
      <section class="card">
        <h2>新規タスク</h2>
        <form id="createForm">
          <input id="title" type="text" maxlength="200" required placeholder="タイトル（必須）"/>
          <button type="submit">追加</button>
        </form>
      </section>

      <section class="card">
        <h2>タスク一覧</h2>
        <div class="row">
          <button id="reload_button" type="button">再読み込み</button>
        </div>
        <ul id="task_list" class="list"></ul>
      </section>
    
    </main>
    <script src="/frontend/main.js"></script>
  </body>
</html>
