<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="Taskal-新規登録" content="Taskalに新規登録する方はこちら" />
    <title>Taskal-regist</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
    <main class="mainpage">

        <div class="logo_area">
            <img class="svg" src="../svg/icon.svg">
        </div>
        
        <p class="description">Taskalを利用するにはログインする必要があります</p>

        <section id="login">
            <form class="form">
                <div class="input_field">
                    <label id="email_label" for="email">メールアドレス*</label>
                    <input id="email" class="email" type="email" name="email" placeholder="xxx@example.com" required>
                </div>
                <div class="input_field">
                    <label id="password_label" for="password">パスワード*</label>
                    <input id="password" class="password" type="password" placeholder="半角英数字8文字以上で入力してください" required>
                </div>
                <button id="regist_button" type="submit" name="regist_button">ログイン</button>
            </form>
            <a class="link" href="./auth_regist.html">
                アカウントをお持ちでない方はこちら
            </a>
        </section>
    </main>
    
    <script src="../js/auth_login.js"></script>
</body>
</html>
